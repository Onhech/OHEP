<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Driver Action Matrix - 16:9 Slide</title>
<style>
  * { box-sizing: border-box; }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: #E2E8F0; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0; 
  }
  
  /* --- STRICT 16:9 SLIDE CONTAINER --- */
  .slide-container {
    width: 1280px; 
    height: 720px; 
    background: #F8FAFC; 
    padding: 36px 48px; 
    border-radius: 8px; 
    box-shadow: 0 10px 30px rgba(15, 23, 42, 0.1); 
    display: flex;
    flex-direction: column;
    overflow: hidden; 
  }

  /* --- HEADER --- */
  .header-section {
    display: flex;
    flex-direction: column;
    border-bottom: 2px solid #CBD5E1;
    padding-bottom: 12px;
    margin-bottom: 20px;
    flex-shrink: 0;
  }

  .theme-kicker { 
    font-size: 14px; 
    font-weight: 800; 
    color: #475569; 
    text-transform: uppercase; 
    letter-spacing: 1.5px; 
    margin-bottom: 4px; 
  }
  
  .title { font-size: 32px; font-weight: 900; color: #0F172A; margin: 0 0 6px 0; letter-spacing: -0.5px; }
  .subtitle { font-size: 15px; color: #64748B; font-weight: 500; margin: 0; }
  
  /* --- LAYOUT WRAPPER --- */
  .chart-wrapper {
    display: flex;
    position: relative;
    flex: 1;
    min-height: 0;
    margin-top: 10px;
  }

  /* Y-Axis Layout */
  .y-axis {
    width: 60px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    padding-bottom: 20px; 
    flex-shrink: 0;
  }
  
  .y-axis-text {
    font-size: 14px;
    font-weight: 800;
    color: #64748B;
    letter-spacing: 0.5px;
  }
  
  .y-axis-main {
    transform: rotate(-90deg);
    white-space: nowrap;
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: #1E293B;
  }

  /* --- MATRIX LAYOUT --- */
  .matrix-container { 
    position: relative; 
    flex-grow: 1; 
    border-left: 3px solid #94A3B8; 
    border-bottom: 3px solid #94A3B8; 
    display: flex;
    flex-wrap: wrap;
    background: white;
    border-radius: 0 8px 0 0;
    overflow: hidden;
  }
  
  /* Quadrants */
  .quadrant { 
    width: 50%; 
    height: 50%; 
    box-sizing: border-box; 
    padding: 24px;
    font-size: 16px; 
    font-weight: 900; 
    letter-spacing: 1px;
    position: relative;
  }
  
  .q-tl { background-color: #FFF1F2; color: #E11D48; border-right: 2px dashed #CBD5E1; border-bottom: 2px dashed #CBD5E1; }
  .q-tr { background-color: #F0FDFA; color: #0F766E; border-bottom: 2px dashed #CBD5E1; text-align: right; }
  .q-bl { background-color: #F8FAFC; color: #64748B; border-right: 2px dashed #CBD5E1; display: flex; align-items: flex-end; }
  .q-br { background-color: #F1F5F9; color: #94A3B8; display: flex; align-items: flex-end; justify-content: flex-end; }

  /* Data Points Layer */
  .points-layer {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; 
  }

  .point { 
    position: absolute; 
    transform: translate(-50%, -50%); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    pointer-events: auto;
    transition: transform 0.2s ease, z-index 0s;
  }
  
  .point:hover { transform: translate(-50%, -50%) scale(1.08); z-index: 20; }
  
  .dot { 
    width: 22px; 
    height: 22px; 
    border-radius: 50%; 
    border: 3px solid white; 
    box-shadow: 0 4px 8px rgba(0,0,0,0.15); 
  }
  
  /* Priority Colors */
  .dot-orange { background: #E11D48; } /* Critical Focus */
  .dot-teal { background: #0F766E; }   /* Leverage */
  .dot-grey { background: #64748B; }   /* Monitor & Maintain */
  
  .label { 
    background: white; 
    padding: 6px 12px; 
    border-radius: 6px; 
    font-size: 13px; 
    font-weight: 800; 
    color: #1E293B; 
    margin-top: 8px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.08); 
    border: 1px solid #E2E8F0; 
    white-space: nowrap; 
  }

  /* X-Axis Layout */
  .x-axis {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-left: 60px; /* Offset for Y-axis */
    margin-top: 20px;
    flex-shrink: 0;
  }

  .x-axis-text {
    font-size: 14px;
    font-weight: 800;
    color: #64748B;
    letter-spacing: 0.5px;
  }

  .x-axis-main {
    font-size: 16px;
    font-weight: 900;
    letter-spacing: 1.5px;
    color: #1E293B;
  }

  /* --- FOOTER --- */
  .footer {
    display: flex;
    justify-content: flex-end;
    align-items: flex-end;
    flex-shrink: 0;
    margin-top: 12px;
  }
  
  .brand {
    font-size: 18px;
    font-weight: 800;
    color: #334155;
    letter-spacing: -0.5px;
  }
  .brand-dot { color: #0EA5E9; }

</style>
</head>
<body>

<div class="slide-container">
  
  <div class="chart-wrapper">
    <div class="y-axis">
      <div class="y-axis-text">HIGH</div>
      <div class="y-axis-main">IMPACT ON OUTCOMES</div>
      <div class="y-axis-text">LOW</div>
    </div>

    <div class="matrix-container">
      <div class="quadrant q-tl">CRITICAL FOCUS</div>
      <div class="quadrant q-tr">LEVERAGE</div>
      <div class="quadrant q-bl">MONITOR</div>
      <div class="quadrant q-br">MAINTAIN</div>
      
      <div class="points-layer">
        
        <div class="point" style="left: 28%; top: 12%;">
          <div class="dot dot-orange"></div>
          <div class="label">Learning</div>
        </div>
        <div class="point" style="left: 45%; top: 38%;">
          <div class="dot dot-orange"></div>
          <div class="label">Leadership</div>
        </div>
        
        <div class="point" style="left: 82%; top: 22%;">
          <div class="dot dot-teal"></div>
          <div class="label">Purpose</div>
        </div>
        
        <div class="point" style="left: 25%; top: 65%;">
          <div class="dot dot-grey"></div>
          <div class="label">Performance Dev.</div>
        </div>
        <div class="point" style="left: 12%; top: 90%;">
          <div class="dot dot-grey"></div>
          <div class="label">Strategy</div>
        </div>

        <div class="point" style="left: 55%; top: 65%;">
          <div class="dot dot-grey"></div>
          <div class="label">Respect, Care, & Trust</div>
        </div>
        <div class="point" style="left: 58%; top: 82%;">
          <div class="dot dot-grey"></div>
          <div class="label">Communication</div>
        </div>

      </div>
    </div>
  </div>

  <div class="x-axis">
    <div class="x-axis-text">LAGGING</div>
    <div class="x-axis-main">PERFORMANCE VS. BENCHMARK</div>
    <div class="x-axis-text">LEADING</div>
  </div>

</div>

</body>
</html>
