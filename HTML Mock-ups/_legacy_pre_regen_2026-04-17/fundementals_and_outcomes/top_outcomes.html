<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OHEP Companion Outcomes - Final Polish</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f1f5f9;
    padding: 40px;
    display: flex;
    justify-content: center;
  }

  .card {
    width: 500px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 18px;
    padding: 28px;
    box-shadow: 0 10px 24px rgba(15,23,42,.03);
    display: flex;
    flex-direction: column;
  }

  /* --- HEADERS --- */
  .outcomes-title { 
    font-size: 22px; 
    font-weight: 800; 
    color: #111827; 
    margin-bottom: 12px; 
  }
  
  .outcomes-subtitle { 
    font-size: 13px; 
    color: #64748b; 
    margin-bottom: 24px; 
    line-height: 1.4; 
  }
  .outcomes-subtitle strong { color: #111827; }

  /* --- TABLE STYLES --- */
  .table-outcomes { 
    width: 100%; 
    border-collapse: collapse; 
  }

  .table-outcomes th {
    text-align: left;
    padding-bottom: 12px;
    font-size: 11px;
    font-weight: 800;
    color: #94a3b8; /* Unified grey for both headers */
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #e2e8f0;
  }
  
  .table-outcomes th.right-align { 
    text-align: right; 
  }

  .table-outcomes td {
    padding: 18px 0;
    border-bottom: 1px solid #f1f5f9;
    vertical-align: middle;
  }
  .table-outcomes tr:last-child td { border-bottom: none; }

  /* Left Column Styling */
  .row-rank { 
    font-size: 24px; 
    font-weight: 800; 
    color: #cbd5e1; 
    margin-right: 12px;
    font-variant-numeric: tabular-nums;
  }
  .row-name { 
    font-size: 16px; 
    font-weight: 800; 
    color: #111827; 
  }

  /* Right Column Styling (Company Score) */
  .company-score-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
  }
  .row-score-val { 
    font-size: 15px; /* Slightly bumped for hierarchy */
    font-weight: 800; 
    line-height: 1;
  }
  .row-status { 
    font-size: 11px; /* Made smaller for a more "designed" look */
    font-weight: 700; 
    text-transform: uppercase; /* Caps look more intentional at small sizes */
    letter-spacing: 0.3px;
    margin-top: 5px; 
    text-align: right;
  }

  /* Status Colors */
  .color-risk { color: #DC2626; }
  .color-watch { color: #D97706; }
  .color-good { color: #16A34A; }

</style>
</head>
<body>

  <div class="card">
    <div class="outcomes-title">Top Outcomes</div>
    <div class="outcomes-subtitle">Ranked by how strongly <strong>Purpose</strong> acts as a driver for these results.</div>
    
    <table class="table-outcomes">
      <thead>
        <tr>
          <th>Outcome</th>
          <th class="right-align">Your Company</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>
            <span class="row-rank">1</span>
            <span class="row-name">Turnover Intentions</span>
          </td>
          <td>
            <div class="company-score-stack">
              <span class="row-score-val color-risk">22nd Percentile</span>
              <span class="row-status color-risk">Needs Improvement</span>
            </div>
          </td>
        </tr>

        <tr>
          <td>
            <span class="row-rank">2</span>
            <span class="row-name">Worker Satisfaction</span>
          </td>
          <td>
            <div class="company-score-stack">
              <span class="row-score-val color-good">78th Percentile</span>
              <span class="row-status color-good">Above Standard</span>
            </div>
          </td>
        </tr>

        <tr>
          <td>
            <span class="row-rank">3</span>
            <span class="row-name">Engagement</span>
          </td>
          <td>
            <div class="company-score-stack">
              <span class="row-score-val color-watch">45th Percentile</span>
              <span class="row-status color-watch">Industry Standard</span>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</body>
</html>
