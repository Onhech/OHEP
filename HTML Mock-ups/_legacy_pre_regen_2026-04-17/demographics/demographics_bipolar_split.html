<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operational Deployment Split</title>

<style>
  * { box-sizing: border-box; }

  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    background: #F8FAFC; 
    display: flex; 
    justify-content: center; 
    align-items: center;
    height: 100vh;
    margin: 0; 
  }

  /* --- CARD STYLING --- */
  .card {
    background: white; 
    padding: 30px 40px 40px 40px; 
    border-radius: 12px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.03); 
    border: 1px solid #E2E8F0;
    display: flex;
    flex-direction: column;
    width: 680px; 
    /* Fixed height removed to eliminate excess vertical space */
  }

  .card-header { margin-bottom: 30px; }
  .card-title { font-size: 16px; font-weight: 800; color: #0F172A; margin: 0 0 6px 0; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-sub { font-size: 13px; color: #64748B; font-weight: 500; margin: 0; }

  /* --- CHART AREA (Inline Row) --- */
  .chart-area {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
  }

  /* Side Anchor Labels */
  .side-label {
    display: flex;
    flex-direction: column;
    width: 100px;
    flex-shrink: 0;
  }
  .label-left { text-align: right; align-items: flex-end; }
  .label-right { text-align: left; align-items: flex-start; }
  
  .lbl-title { font-size: 13px; font-weight: 800; color: #0F172A; text-transform: uppercase; letter-spacing: 0.5px; }
  .lbl-count { font-size: 12px; font-weight: 600; color: #64748B; margin-top: 4px; }

  /* Diverging Axis Track */
  .diverge-axis { 
    flex: 1;
    height: 56px; /* Increased height for thicker bars */
    display: flex; 
    position: relative; 
    align-items: center; 
    /* Horizontal line removed */
  }
  
  .axis-mid { 
    position: absolute; 
    left: 50%; 
    transform: translateX(-50%);
    height: 64px; /* Taller to slightly bisect the thicker bars */
    width: 2px; 
    background: #334155; 
    z-index: 5; 
  }
  
  .axis-mid-lbl {
    position: absolute; left: 50%; top: -24px;
    transform: translateX(-50%);
    font-size: 10px; font-weight: 800; color: #94A3B8; text-transform: uppercase;
  }

  /* Thicker bars */
  .bar-left { 
    position: absolute; right: 50%; height: 48px; background: #0EA5E9; 
    border-radius: 8px 0 0 8px; display: flex; align-items: center; justify-content: flex-end; padding-right: 16px; 
  }
  .bar-right { 
    position: absolute; left: 50%; height: 48px; background: #0F766E; 
    border-radius: 0 8px 8px 0; display: flex; align-items: center; justify-content: flex-start; padding-left: 16px; 
  }

  .bar-val { font-size: 16px; font-weight: 800; color: white; letter-spacing: 0.5px; }

</style>
</head>

<body>

<div class="card">
  <div class="card-header">
    <h2 class="card-title">Operational Deployment Split</h2>
    <p class="card-sub"></p>
  </div>

  <div class="chart-area">
    
    <div class="side-label label-left">
      <span class="lbl-title" style="color: #0EA5E9;">Office HQ</span>
      <span class="lbl-count">75 People</span>
    </div>

    <div class="diverge-axis">
      <div class="axis-mid">
        <span class="axis-mid-lbl">Center</span>
      </div>
      
      <div class="bar-left" style="width: 33.5%;">
        <span class="bar-val">67%</span>
      </div>
      
      <div class="bar-right" style="width: 16.5%;">
        <span class="bar-val">33%</span>
      </div>
    </div>

    <div class="side-label label-right">
      <span class="lbl-title" style="color: #0F766E;">Field Sites</span>
      <span class="lbl-count">37 People</span>
    </div>

  </div>
</div>

</body>
</html>
